<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benzineres Catalunya — Preus en temps real</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --bg: #f0f1f5;
    --surface: #ffffff;
    --surface2: #f4f5f9;
    --border: #e2e4ed;
    --accent: #c8102e;
    --accent2: #0066cc;
    --text: #111827;
    --text2: #6b7280;
    --red: #c8102e;
    --green: #059669;
    --orange: #d97706;
    --panel-w: 320px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* LAYOUT */
  .app-body { flex: 1; display: flex; overflow: hidden; }

  /* INFO STRIP */
  .panel-info-strip {
    padding: 7px 16px; font-size: 12px; color: var(--text2);
    background: var(--surface2); border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
  }
  .panel-info-strip-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .panel-info-hint { font-size: 13px; font-weight: 700; color: var(--text); }
  .panel-info-strip .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* PANEL LATERAL */
  .panel {
    width: var(--panel-w); min-width: var(--panel-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden; z-index: 500;
  }

  .panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .panel-label { font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }

  /* SELECTOR DE COMBUSTIBLE */
  .fuel-tabs { display: flex; flex-direction: column; gap: 4px; }
  .fuel-row { display: flex; gap: 4px; }
  .fuel-tab {
    flex: 1;
    padding: 7px 6px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); cursor: pointer;
    font-family: 'Source Sans 3', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.15s; text-align: center; white-space: nowrap;
  }
  .fuel-tab:hover { border-color: #3effd0; color: #111; background: rgba(62,255,208,0.12); }
  .fuel-tab.active { background: #3effd0; border-color: #3effd0; color: #000; font-weight: 600; }

  /* ESTADÍSTIQUES */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box { background: var(--surface2); border-radius: 8px; padding: 10px 8px; text-align: center; border: 1px solid var(--border); }
  .stat-val { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .stat-box.min .stat-val { color: var(--green); }
  .stat-box.max .stat-val { color: var(--red); }

  /* LLEGENDA COLORS */
  .legend-bar { height: 10px; border-radius: 5px; background: linear-gradient(to right, #15803d, #4ade80, #fb923c, #fca5a5, #b91c1c); margin-bottom: 6px; }
  .legend-labels { display: flex; justify-content: space-between; font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text2); }

  /* FILTRES ADDICIONALS */
  .filter-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .filter-label { font-size: 14px; color: var(--text2); }
  .filter-input {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 5px 10px; font-size: 14px; font-family: 'Source Sans 3', sans-serif;
    width: 160px;
  }
  .filter-input:focus { outline: none; border-color: var(--accent); }
  .toggle-24h { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .toggle-switch { width: 36px; height: 20px; border-radius: 10px; background: var(--border); position: relative; transition: background 0.2s; }
  .toggle-switch.on { background: var(--accent2); }
  .toggle-switch::after { content: ''; width: 14px; height: 14px; background: white; border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: left 0.2s; }
  .toggle-switch.on::after { left: 19px; }

  /* LLISTA D'ESTACIONS */
  .station-list-header { padding: 12px 16px 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 13px; color: var(--text2); letter-spacing: 0.1em; text-transform: uppercase; }
  .station-list { flex: 1; overflow-y: auto; }
  .station-list::-webkit-scrollbar { width: 4px; }
  .station-list::-webkit-scrollbar-track { background: transparent; }
  .station-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .station-item {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; display: flex; align-items: center; gap: 10px;
  }
  .station-item:hover { background: var(--surface2); }
  .station-item.selected { background: var(--surface2); border-left: 3px solid var(--accent); }
  .station-rank { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--text2); width: 20px; flex-shrink: 0; }
  .station-info { flex: 1; min-width: 0; }
  .station-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .station-loc { font-size: 13px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .station-price { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; flex-shrink: 0; }

  /* TOOLTIP LEAFLET */
  .leaflet-tooltip {
    background: var(--text) !important; color: var(--surface) !important;
    border: none !important; border-radius: 6px !important;
    font-family: 'Source Sans 3', sans-serif; font-size: 13px !important;
    padding: 5px 9px !important; box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
    white-space: nowrap;
  }
  .leaflet-tooltip::before { display: none !important; }

  /* MAPA */
  #map { flex: 1; }
  .leaflet-container { background: #e5e3df; }

  /* POPUP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; color: var(--text) !important;
    border: 1px solid var(--border) !important; border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .leaflet-popup-content { margin: 14px 16px !important; min-width: 200px; }
  .popup-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .popup-addr { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.4; }
  .popup-prices { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .popup-price-item { background: var(--surface2); border-radius: 6px; padding: 6px 8px; }
  .popup-price-lbl { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .popup-price-val { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; }
  .popup-schedule { margin-top: 10px; font-size: 12px; color: var(--text2); border-top: 1px solid var(--border); padding-top: 8px; }
  .popup-24h { display: inline-block; background: var(--green); color: #000; font-size: 12px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; }
  .popup-gmaps { display: block; margin-top: 10px; padding: 7px 10px; background: #3effd0; color: #000; border-radius: 6px; font-size: 13px; font-weight: 600; text-align: center; text-decoration: none; }

  /* LOADING */
  .loading-overlay {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 16px;
  }
  .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: var(--text2); }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    body { height: auto; min-height: 100dvh; overflow-y: auto; overflow-x: hidden; }
    .app-body { flex-direction: column; height: auto; overflow: visible; }
    #map { order: 1; height: 55vh; flex: none; }
    .panel {
      order: 2;
      width: 100%; min-width: unset; position: static;
      height: auto; max-height: none; overflow: visible;
      border-right: none; border-top: 1px solid var(--border);
    }
    .station-list { flex: none; overflow: visible; height: auto; }
    .panel-section { padding: 10px 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Carregant preus...</div>
</div>

<div class="app-body">
  <div class="panel">
    <div class="panel-info-strip">
      <div class="panel-info-strip-row">
        <div class="status-dot"></div>
        <span id="hdr-count">—</span> estacions ·
        <span id="hdr-fuel" style="color:var(--accent)">Gasolina 95</span> ·
        Act. <span id="hdr-updated">—</span>
      </div>
      <div class="panel-info-hint">Si cliques sobre una estació de servei, trobaràs un enllaç per veure com arribar-hi des de Google Maps.</div>
    </div>
    <!-- COMBUSTIBLE -->
    <div class="panel-section">
      <div class="panel-label">Combustible</div>
      <div class="fuel-tabs">
        <div class="fuel-row">
          <button class="fuel-tab active" data-fuel="Gasolina95">G-95</button>
          <button class="fuel-tab" data-fuel="Gasolina95Premium">G-95 Prem.</button>
          <button class="fuel-tab" data-fuel="Gasolina98">G-98</button>
        </div>
        <div class="fuel-row">
          <button class="fuel-tab" data-fuel="GasoleoA">Dièsel</button>
          <button class="fuel-tab" data-fuel="GasoloePremium">Dièsel Prem.</button>
          <button class="fuel-tab" data-fuel="GasoleoB">Dièsel B</button>
        </div>
        <div class="fuel-row">
          <button class="fuel-tab" data-fuel="GLP">GLP</button>
          <button class="fuel-tab" data-fuel="GNC">GNC</button>
          <button class="fuel-tab" data-fuel="GNL">GNL</button>
          <button class="fuel-tab" data-fuel="Adblue">AdBlue</button>
        </div>
      </div>
    </div>

    <!-- ESTADÍSTIQUES -->
    <div class="panel-section">
      <div class="panel-label">Preus actuals</div>
      <div class="stats-grid">
        <div class="stat-box min"><div class="stat-val" id="stat-min">—</div><div class="stat-lbl">Mínim</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-med">—</div><div class="stat-lbl">Mediana</div></div>
        <div class="stat-box max"><div class="stat-val" id="stat-max">—</div><div class="stat-lbl">Màxim</div></div>
      </div>
      <div style="margin-top:10px">
        <div class="legend-bar"></div>
        <div class="legend-labels">
          <span id="leg-min">baix</span>
          <span>preu</span>
          <span id="leg-max">alt</span>
        </div>
      </div>
    </div>

    <!-- FILTRES -->
    <div class="panel-section">
      <div class="panel-label">Filtres</div>
      <div class="filter-row">
        <span class="filter-label">Municipi</span>
        <input class="filter-input" id="filter-muni" placeholder="Tots..." list="muni-list">
        <datalist id="muni-list"></datalist>
      </div>
      <div class="filter-row">
        <span class="filter-label">Comarca</span>
        <select class="filter-input" id="filter-comarca">
          <option value="">Totes</option>
        </select>
      </div>
      <div class="filter-row" style="margin-bottom:0">
        <label class="toggle-24h" for="toggle-24h-cb">
          <span class="filter-label">Només 24h</span>
          <div class="toggle-switch" id="toggle-24h-sw"></div>
        </label>
        <input type="checkbox" id="toggle-24h-cb" style="display:none">
      </div>
    </div>

    <!-- LLISTA -->
    <div class="station-list-header" id="list-header">Les més barates</div>
    <div class="station-list" id="station-list"></div>
  </div>

  <div id="map"></div>
</div>

// ── COLOR per PREU ─────────────────────────────────────────────────────────────
// Degradat continu: verd fosc (min) → verd clar → taronja (mediana) → vermell clar → vermell fosc (max)
// El verd/vermell comença a ±3 cèntims de la mediana, inicialment clar i progressivament més fosc
function priceColor(price, min, max, med) {
  if (!price || price <= 0) return '#bbb';
  const BAND = 0.03;

  function lerp(a, b, t) { return Math.round(a + (b - a) * Math.max(0, Math.min(1, t))); }

  if (price <= med) {
    const bandStart = med - BAND;
    if (price >= bandStart) {
      // [med-BAND → med]: verd clar (#4ade80) → taronja (#fb923c)
      const t = BAND > 0 ? (price - bandStart) / BAND : 1;
      return `rgb(${lerp(74,251,t)},${lerp(222,146,t)},${lerp(128,60,t)})`;
    } else {
      // [min → med-BAND]: verd fosc (#15803d) → verd clar (#4ade80)
      const range = bandStart - min;
      const t = range > 0 ? (price - min) / range : 0;
      return `rgb(${lerp(21,74,t)},${lerp(128,222,t)},${lerp(61,128,t)})`;
    }
  } else {
    const bandEnd = med + BAND;
    if (price <= bandEnd) {
      // [med → med+BAND]: taronja (#fb923c) → vermell clar (#fca5a5)
      const t = BAND > 0 ? (price - med) / BAND : 0;
      return `rgb(${lerp(251,252,t)},${lerp(146,165,t)},${lerp(60,165,t)})`;
    } else {
      // [med+BAND → max]: vermell clar (#fca5a5) → vermell fosc (#b91c1c)
      const range = max - bandEnd;
      const t = range > 0 ? (price - bandEnd) / range : 1;
      return `rgb(${lerp(252,185,t)},${lerp(165,28,t)},${lerp(165,28,t)})`;
    }
  }
}

// ── CARREGA PREUS DES DE L'API ─────────────────────────────────────────────────
async function loadPrices() {
  try {
    // Primer intent: preus.json local (GitHub Pages)
    let data;
    try {
      const r = await fetch('data/preus.json');
      if (r.ok) {
        data = await r.json();
        console.log('Preus carregats des de preus.json local');
      } else { throw new Error('no local'); }
    } catch {
      // Segon intent: API directa (CORS permès per Chromium / extensió)
      const r = await fetch('https://energia.serviciosmin.gob.es/ServiciosRestCarburantes/PreciosCarburantes/EstacionesTerrestres/FiltroCCAA/09');
      const raw = await r.json();
      // Transformar format API al format de preus.json
      data = transformAPIResponse(raw);
      console.log('Preus carregats des de API directa');
    }

    lastUpdated = data.fecha_actualizacion || data.timestamp_utc || '—';
    document.getElementById('hdr-updated').textContent = lastUpdated.replace(/(\d{2}):(\d{2})(?::(\d{2}))?/, (_, h, m, s) => s ? `${h}.${m}.${s}` : `${h}.${m}`);

    // Indexar preus per IDEESS
    pricesData = {};
    (data.precios || []).forEach(p => {
      pricesData[String(p.IDEESS)] = p;
    });

    mergAndRender();
    document.getElementById('loading').style.display = 'none';
  } catch (err) {
    console.error('Error carregant preus:', err);
    document.getElementById('loading').innerHTML = '<div style="color:#c8102e;font-family:monospace;font-size:13px;text-align:center;padding:20px">Error carregant les dades.<br><br><small>' + err.message + '</small></div>';
  }
}

function transformAPIResponse(raw) {
  const precios = raw.ListaEESSPrecio.map(p => ({
    IDEESS: p.IDEESS,
    Rotulo: p['Rótulo'] || '',
    Gasolina95:        parsePrice(p['Precio Gasolina 95 E5']),
    Gasolina95Premium: parsePrice(p['Precio Gasolina 95 E5 Premium']),
    Gasolina98:        parsePrice(p['Precio Gasolina 98 E5']),
    GasoleoA:          parsePrice(p['Precio Gasoleo A']),
    GasoloePremium:    parsePrice(p['Precio Gasoleo Premium']),
    GasoleoB:          parsePrice(p['Precio Gasoleo B']),
    GLP:               parsePrice(p['Precio Gases licuados del petróleo']),
    GNC:               parsePrice(p['Precio Gas Natural Comprimido']),
    GNL:               parsePrice(p['Precio Gas Natural Licuado']),
    Hidrogen:          parsePrice(p['Precio Hidrogeno']),
    Adblue:            parsePrice(p['Precio Adblue']),
  }));
  return { fecha_actualizacion: raw.Fecha, precios };
}

function parsePrice(s) {
  if (!s || s === '') return null;
  return parseFloat(String(s).replace(',', '.')) || null;
}

// ── COMBINAR BASE + PREUS ──────────────────────────────────────────────────────
function mergAndRender() {
  mergedStations = Object.values(STATIONS_BASE).map(base => {
    const pr = pricesData[base.id] || {};
    const comarca = COMARCA_MAP[(base.municipio || '').toUpperCase()] || '';
    return { ...base, ...pr, comarca };
  });
  populateMuniList();
  populateComarcaSelect();
  renderAll();
  // Zoom inicial a tots els punts, sense marges
  const allCoords = mergedStations.filter(s => s.lat && s.lon).map(s => [s.lat, s.lon]);
  if (allCoords.length > 0) {
    const bounds = L.latLngBounds(allCoords);
    if (bounds.isValid()) {
      const zoom = map.getBoundsZoom(bounds, true);
      map.setView(bounds.getCenter(), zoom);
    }
  }
}

function populateComarcaSelect() {
  const comarques = [...new Set(mergedStations.map(s => s.comarca).filter(Boolean))].sort();
  const sel = document.getElementById('filter-comarca');
  const current = sel.value;
  sel.innerHTML = '<option value="">Totes</option>' +
    comarques.map(c => `<option value="${c}"${c === current ? ' selected' : ''}>${c}</option>`).join('');
}

function populateMuniList() {
  const munis = [...new Set(mergedStations.map(s => s.municipio).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ca', { sensitivity: 'base' }));
  const dl = document.getElementById('muni-list');
  dl.innerHTML = munis.map(m => `<option value="${m}">`).join('');
}

// ── FORMAT PREU ───────────────────────────────────────────────────────────────
function fmtPreu(v) { return v.toFixed(3).replace('.', ','); }

// ── RENDER PRINCIPAL ───────────────────────────────────────────────────────────
function renderAll() {
  const fuel = currentFuel;

  // Filtrar
  let filtered = mergedStations.filter(s => {
    if (filterComarca && s.comarca !== filterComarca) return false;
    if (filterMuni && s.municipio.toLowerCase() !== filterMuni.toLowerCase()) return false;
    if (only24h && !(s.horario || '').includes('24H')) return false;
    return true;
  });

  // Estacions amb preu del combustible seleccionat
  const withPrice = filtered.filter(s => s[fuel] && s[fuel] > 0);

  // Estadístiques i markers
  if (withPrice.length > 0) {
    const prices = withPrice.map(s => s[fuel]).sort((a,b) => a-b);
    const minP = prices[0];
    const maxP = prices[prices.length-1];
    const medP = prices[Math.floor(prices.length/2)];
    document.getElementById('stat-min').textContent = fmtPreu(minP) + ' €';
    document.getElementById('stat-med').textContent = fmtPreu(medP) + ' €';
    document.getElementById('stat-max').textContent = fmtPreu(maxP) + ' €';
    document.getElementById('leg-min').textContent = fmtPreu(minP);
    document.getElementById('leg-max').textContent = fmtPreu(maxP);
    updateMarkers(filtered, withPrice, minP, maxP, medP, fuel);
    const sorted = [...withPrice].sort((a,b) => a[fuel] - b[fuel]);
    renderList(sorted.slice(0, 10), fuel, minP, maxP, medP);
    document.getElementById('list-header').textContent = `Les més barates (de ${withPrice.length.toLocaleString('ca-ES')} amb preu)`;
  } else {
    // Cap estació amb aquest combustible: mostrar totes en gris
    document.getElementById('stat-min').textContent = '—';
    document.getElementById('stat-med').textContent = '—';
    document.getElementById('stat-max').textContent = '—';
    document.getElementById('leg-min').textContent = '—';
    document.getElementById('leg-max').textContent = '—';
    updateMarkers(filtered, [], 0, 0, 0, fuel);
    document.getElementById('station-list').innerHTML = '<div style="padding:16px;font-size:13px;color:var(--text2)">Cap estació amb dades per a aquest combustible.</div>';
    document.getElementById('list-header').textContent = 'Les més barates';
  }

  document.getElementById('hdr-count').textContent = filtered.length.toLocaleString('ca-ES');
  document.getElementById('hdr-fuel').textContent = FUEL_LABELS[fuel] || fuel;
}

// Escala de radi segons zoom (1x al zoom 8, fins a 2.5x al zoom 14+) i dispositiu
function zoomScale() {
  const mobile = window.innerWidth <= 700 ? 0.7 : 1;
  return mobile * Math.min(2.5, Math.max(1, 1 + (map.getZoom() - 8) * 0.25));
}

function updateMarkers(allFiltered, withPrice, minP, maxP, medP, fuel) {
  // IDs actuals filtrades
  const filteredIds = new Set(allFiltered.map(s => s.id));

  // Eliminar markers que no estan al filtre
  Object.keys(markers).forEach(id => {
    if (!filteredIds.has(id)) {
      map.removeLayer(markers[id]);
      delete markers[id];
    }
  });

  const scale = zoomScale();
  const withPriceMarkers = [];
  const noPriceMarkers   = [];

  allFiltered.forEach(s => {
    const price = s[fuel] && s[fuel] > 0 ? s[fuel] : null;
    const color = price ? priceColor(price, minP, maxP, medP) : '#bbb';
    const baseRadius = price ? 6 : 4;
    const radius = Math.round(baseRadius * scale);
    const fillOp = price ? 0.6 : 0.2;
    const strokeOp = price ? 1 : 0.5;

    const tipHtml = `<b>${s.rotulo || '—'}</b><br>${price ? fmtPreu(price) + ' €' : 'Sense preu'}`;

    if (markers[s.id]) {
      markers[s.id]._baseRadius = baseRadius;
      markers[s.id].setStyle({ fillColor: color, color: color, fillOpacity: fillOp, opacity: strokeOp, radius });
      if (markers[s.id].getTooltip()) markers[s.id].setTooltipContent(tipHtml);
    } else {
      const m = L.circleMarker([s.lat, s.lon], {
        radius, color, fillColor: color, fillOpacity: fillOp, opacity: strokeOp, weight: 1.5,
      }).addTo(map);

      m._baseRadius = baseRadius;
      m.bindPopup(() => buildPopup(s, fuel), { maxWidth: 260 });
      m.bindTooltip(tipHtml, { sticky: false, direction: 'top', offset: [0, -8] });
      m.on('click', () => selectStation(s.id));
      markers[s.id] = m;
    }

    // Classificar per z-order
    (price ? withPriceMarkers : noPriceMarkers).push(markers[s.id]);
  });

  // Els gris (sense preu) queden darrere; els de color al davant
  noPriceMarkers.forEach(m => m.bringToBack());
  withPriceMarkers.forEach(m => m.bringToFront());
}

// Actualitzar radis en fer zoom o canviar orientació
function refreshRadii() {
  const scale = zoomScale();
  Object.values(markers).forEach(m => {
    if (m._baseRadius) m.setRadius(Math.round(m._baseRadius * scale));
  });
}
map.on('zoomend', refreshRadii);
window.addEventListener('resize', refreshRadii);

function tradueixAdreca(adr) {
  if (!adr) return '';
  const subs = [
    // Tipus de via principals
    [/\bCALLES\b/g,          'CARRERS'],
    [/\bCALLE\b/g,           'CARRER'],
    [/\bCL\b/g,              'CARRER'],
    [/\bC\//g,               'CARRER'],
    [/\bAVENIDAS\b/g,        'AVINGUDES'],
    [/\bAVENIDA\b/g,         'AVINGUDA'],
    [/\bAVDA\.?/g,           'AVINGUDA'],
    [/\bPLAZAS\b/g,          'PLACES'],
    [/\bPLAZA\b/g,           'PLAÇA'],
    [/\bPASEOS\b/g,          'PASSEIGS'],
    [/\bPASEO\b/g,           'PASSEIG'],
    [/\bCAMINOS\b/g,         'CAMINS'],
    [/\bCAMINO\b/g,          'CAMÍ'],
    [/\bPOLIGONOS?\b/g,      'POLÍGON'],
    [/\bPOL\.\b/g,           'POLÍGON'],
    [/\bTRAVES[IÍ]AS?\b/g,   'TRAVESSERA'],
    [/\bCALLEJ[OÓ]N\b/g,     'CARRERÓ'],
    [/\bPASAJES?\b/g,        'PASSATGE'],
    [/\bBULEVAR\b/g,         'BULEVARD'],
    [/\bPROLONGACI[OÓ]N\b/g, 'PROLONGACIÓ'],
    [/\bURBANIZACI[OÓ]N\b/g, 'URBANITZACIÓ'],
    [/\bURB\b/g,              'URB.'],
    [/\bACCESOS?\b/g,         'ACCÉS'],
    [/\bBARRIO\b/g,           'BARRI'],
    [/\bPARAJES?\b/g,         'PARATGE'],
    [/\bCUESTA\b/g,           'COSTA'],
    [/\bGLORIETA\b/g,         'GLORIETA'],
    [/\bMUELLE\b/g,           'MOLL'],
    [/\bPARQUE\b/g,           'PARC'],
    [/\bPARCELA\b/g,          'PARCEL·LA'],
    [/\bSENDERO\b/g,          'SENDER'],
    [/\bVERTEDERO\b/g,        'ABOCADOR'],
    [/\bPOLIGON\b/g,          'POLÍGON'],
    // Abreviatures de carretera (no traduïdes, ja són iguals)
    [/\bCTRA\.\b/g,  'CTRA.'],
    [/\bCRTA\.\b/g,  'CTRA.'],
    [/\bCRTA\b/g,    'CTRA.'],
    [/\bCR\b/g,      'CTRA.'],
  ];
  let r = adr;
  subs.forEach(([pat, rep]) => { r = r.replace(pat, rep); });
  return r;
}

function formatHorari(h) {
  if (!h) return '';
  const dm = {L:'dl', M:'dm', X:'dc', J:'dj', V:'dv', S:'ds', D:'dg'};
  return h.replace(/\b([LMXJVSD])\b/g, (_, d) => dm[d] || d);
}

function buildPopup(s, fuel) {
  const pr = (key) => {
    const v = s[key];
    return v && v > 0 ? `<div class="popup-price-item"><div class="popup-price-lbl">${FUEL_LABELS[key] || key}</div><div class="popup-price-val" style="color:${priceForItem(v, fuel, s)}">${fmtPreu(v)} €</div></div>` : '';
  };
  const is24h = (s.horario || '').includes('24H');
  const fuels = [
    pr('Gasolina95'), pr('Gasolina95Premium'), pr('Gasolina98'),
    pr('GasoleoA'), pr('GasoloePremium'), pr('GasoleoB'),
    pr('GLP'), pr('GNC'), pr('GNL'), pr('Adblue'),
  ].filter(Boolean).join('');

  const gmapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lon}`;
  return `<div>
    <div class="popup-name">${s.rotulo || '—'}</div>
    <div class="popup-addr">${tradueixAdreca(s.direccion)}<br>${s.municipio || ''} (${s.provincia || ''})</div>
    <div class="popup-prices">${fuels || '<div style="color:var(--text2);font-size:11px;grid-column:1/-1">Sense preus disponibles</div>'}</div>
    <div class="popup-schedule">${is24h ? '<span class="popup-24h">24H</span><br>' : ''}${formatHorari(s.horario)}</div>
    <a class="popup-gmaps" href="${gmapsUrl}" target="_blank" rel="noopener">📍 Com anar-hi (Google Maps)</a>
  </div>`;
}

function priceForItem(v, activeFuel, s) {
  // Destacar el combustible actiu
  return '#111827';
}

function renderList(stations, fuel, minP, maxP, medP) {
  const list = document.getElementById('station-list');
  list.innerHTML = stations.map((s, i) => {
    const price = s[fuel];
    const color = priceColor(price, minP, maxP, medP);
    const isSelected = s.id === selectedId;
    return `<div class="station-item${isSelected ? ' selected' : ''}" data-id="${s.id}" onclick="selectStation('${s.id}', true)">
      <div class="station-rank">${i+1}</div>
      <div class="station-info">
        <div class="station-name">${s.rotulo || '—'}</div>
        <div class="station-loc">${s.municipio || '—'}</div>
      </div>
      <div class="station-price" style="color:${color}">${fmtPreu(price)}</div>
    </div>`;
  }).join('');
}

function selectStation(id, fromList = false) {
  selectedId = id;
  const s = mergedStations.find(x => x.id === id);
  if (!s) return;

  // Centrar mapa
  map.setView([s.lat, s.lon], Math.max(map.getZoom(), 13));
  if (markers[id]) markers[id].openPopup();

  // Actualitzar llista
  document.querySelectorAll('.station-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === id);
  });
  const el = document.querySelector(`.station-item[data-id="${id}"]`);
  if (fromList && window.innerWidth <= 700) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (el && fromList) {
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── EVENTS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.fuel-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.fuel-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFuel = btn.dataset.fuel;
    renderAll();
  });
});

document.getElementById('filter-comarca').addEventListener('change', e => {
  filterComarca = e.target.value;
  filterMuni = '';
  document.getElementById('filter-muni').value = '';
  if (filterComarca) {
    const sts = mergedStations.filter(s => s.comarca === filterComarca);
    if (sts.length > 0) {
      const bounds = L.latLngBounds(sts.map(s => [s.lat, s.lon]));
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [40, 40] });
    }
  }
  renderAll();
  if (window.innerWidth <= 700) window.scrollTo({ top: 0, behavior: 'smooth' });
});

document.getElementById('filter-muni').addEventListener('input', e => {
  const val = e.target.value.trim();
  if (!val) {
    // Camp buit: reset complet
    filterMuni = '';
    filterComarca = '';
    document.getElementById('filter-comarca').value = '';
    renderAll();
    return;
  }
  const exactMatch = mergedStations.find(s => s.municipio.toLowerCase() === val.toLowerCase());
  if (exactMatch) {
    // Coincidència exacta: filtrar i fer zoom
    filterMuni = val;
    if (exactMatch.comarca) {
      filterComarca = exactMatch.comarca;
      document.getElementById('filter-comarca').value = exactMatch.comarca;
    }
    const sts = mergedStations.filter(s => s.municipio.toLowerCase() === val.toLowerCase());
    if (sts.length > 0) {
      const bounds = L.latLngBounds(sts.map(s => [s.lat, s.lon]));
      if (bounds.isValid()) map.fitBounds(bounds, { padding: [60, 60], maxZoom: 14 });
    }
    renderAll();
    if (window.innerWidth <= 700) window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  // Si no hi ha coincidència exacta (s'està escrivint), no fer res: mantenir estat anterior
});

document.getElementById('toggle-24h-sw').addEventListener('click', () => {
  only24h = !only24h;
  document.getElementById('toggle-24h-sw').classList.toggle('on', only24h);
  renderAll();
});

// ── INICI ──────────────────────────────────────────────────────────────────────
loadPrices();
</script>
