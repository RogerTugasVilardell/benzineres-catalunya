name: Actualitzar preus benzineres

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora
  workflow_dispatch:          # Permet execució manual des de GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Necessari per fer git push

    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4

      - name: Instal·lar R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.0'

      - name: Instal·lar paquets R
        run: |
          install.packages(c("jsonlite", "dplyr"), repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Executar script d'actualització
        run: Rscript update.R

      - name: Commit i push si hi ha canvis
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/preus.json
          git diff --staged --quiet || git commit -m "Actualització automàtica preus $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
